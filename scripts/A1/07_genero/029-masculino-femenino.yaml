  texto_tts_zh: 学习西班牙语
- tipo: explicacion
  titulo_zh: 📖 知识点
  puntos:
  - -o → 阳性 (el libro, el carro)
  - -a → 阴性 (la casa, la mesa)
  - -dad, -ción, -sión, -tad → 阴性 (la ciudad, la canción)
  - -or → 阳性 (el amor, el color)
  - 自然性别决定：el hombre / la mujer
  tts: zh
  texto_tts_zh: -阳性(,)，-阴性(,)，-,-,-,-阴性(,)，-阳性(,)，自然性别决定：/
- tipo: ejemplo
  frase_es: El libro rojo está en la mesa blanca.
  traduccion_zh: 红皮书在白色桌子上。
  analisis:
  - libro (masc) → el, rojo
  - mesa (fem) → la, blanca
  tts: es
  texto_tts_es: El libro rojo está en la mesa blanca
- tipo: ejemplo
  frase_es: La canción es muy bonita.
  traduccion_zh: 这首歌很动听。
  analisis:
  - canción (-ción) → 阴性 la
  - bonita (fem) = 动听的
  tts: es
  texto_tts_es: La canción es muy bonita
- tipo: ejercicio
  titulo_zh: ✏️ 小练习
  frase_es: ¿Masculino o femenino? ciudad, libro, canción, perro, flor
  traduccion_zh: 判断阴阳性：城市、书、歌曲、狗、花
  analisis:
  - 'ciudad: -dad → fem'
  - 'flor: excepción → fem'
  tts: es
  texto_tts_es: ¿Masculino o femenino? ciudad, libro, canción, perro, flor
