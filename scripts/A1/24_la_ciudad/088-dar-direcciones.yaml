- tipo: ejemplo
  frase_es: — ¿Cómo llego al museo? — Sigue recto y gira a la derecha.
  traduccion_zh: 去博物馆怎么走？直走然后右转。
  analisis:
  - Cómo llego a = 怎么到
  - gira = 转（tú imperativo）
  tts: es
  texto_tts_es: — ¿Cómo llego al museo? — Sigue recto y gira a la derecha
- tipo: ejemplo
  frase_es: La farmacia está enfrente del banco.
  traduccion_zh: 药店在银行对面。
  analisis:
  - enfrente de = 在...对面
  - del = de + el
  tts: es
  texto_tts_es: La farmacia está enfrente del banco
