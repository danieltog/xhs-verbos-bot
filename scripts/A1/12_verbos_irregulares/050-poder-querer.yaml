  tts: zh
  texto_tts_zh: 今天我们来学习西班牙语。
- tipo: explicacion
  titulo_zh: 🎯 今天的目标
  puntos:
  - Aprender los verbos modales poder y querer
  tts: zh
  texto_tts_zh: 学习西班牙语
- tipo: explicacion
  titulo_zh: 📖 知识点
  puntos:
  - 'Poder: puedo, puedes, puede, podemos, pueden'
  - 'Querer: quiero, quieres, quiere, queremos, quieren'
  - 'Poder + inf: Puedo ayudarte.'
  - 'Querer + inf: Quiero viajar.'
  tts: zh
  texto_tts_zh: :，:，+:.，+:.
- tipo: ejemplo
  frase_es: ¿Puedes ayudarme, por favor?
  traduccion_zh: 你能帮我吗？
  analisis:
  - Puedes = poder (tú)
  - ayudarme = 帮我
  tts: es
  texto_tts_es: ¿Puedes ayudarme, por favor?
- tipo: ejemplo
  frase_es: Quiero aprender español muy bien.
  traduccion_zh: 我想学好西班牙语。
  analisis:
  - Quiero = querer (yo)
  - muy bien = 很好
  tts: es
  texto_tts_es: Quiero aprender español muy bien
- tipo: ejercicio
  titulo_zh: ✏️ 小练习
  frase_es: Yo no ____ (poder) ir. Ellos ____ (querer) comer.
  traduccion_zh: 我不能去。他们想吃。
  analisis:
  - poder→puedo (o→ue)
  - querer→quieren (e→ie)
  tts: es
  texto_tts_es: Yo no ____ (poder) ir. Ellos ____ (querer) comer
