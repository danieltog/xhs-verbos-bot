  texto_tts_zh: 学习西班牙语
- tipo: explicacion
  titulo_zh: 📖 知识点
  puntos:
  - voy, vas, va, vamos, van
  - 'Ir a + lugar: Voy al cine.'
  - 'Ir a + infinitivo: Voy a comer.'
  - ¿Adónde vas? — 你去哪里？
  tts: zh
  texto_tts_zh: 学习西班牙语，+:.，+:.，?—你去哪里？
- tipo: ejemplo
  frase_es: Voy a la biblioteca a estudiar.
  traduccion_zh: 我去图书馆学习。
  analisis:
  - Voy = ir (yo)
  - a la biblioteca = 去图书馆
  tts: es
  texto_tts_es: Voy a la biblioteca a estudiar
- tipo: ejemplo
  frase_es: Mañana vamos a viajar a Madrid.
  traduccion_zh: 明天我们要去马德里旅行。
  analisis:
  - Vamos a + viajar = 将要旅行
  - futuro próximo
  tts: es
  texto_tts_es: Mañana vamos a viajar a Madrid
- tipo: ejercicio
  titulo_zh: ✏️ 小练习
  frase_es: ¿Adónde ____ (ir/tú)? — ____ (ir/yo) al supermercado.
  traduccion_zh: 你去哪里？我去超市。
  analisis:
  - tú→vas
  - yo→voy
  - al = a + el
  tts: es
  texto_tts_es: ¿Adónde ____ (ir tú)? — ____ (ir yo) al supermercado
