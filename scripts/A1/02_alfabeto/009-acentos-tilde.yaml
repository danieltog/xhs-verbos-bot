- tipo: explicacion
  titulo_zh: Punto 1
  puntos:
  - 以n/s/元音结尾 → 重音在倒数第二个音节
  frase_es: ¿Cómo estás? ¿Dónde vives?
  traduccion_zh: 你好吗？你住在哪里？
  analisis:
  - Cómo 和 Dónde 有重音，因为是疑问词
  - Estás 的重音在最后一个音节
  tts: zh
  texto_tts_zh: 以元音结尾重音在倒数第二个音节
  texto_tts_es: ¿Cómo estás? ¿Dónde vives?
- tipo: explicacion
  titulo_zh: Punto 2
  puntos:
  - 其他辅音结尾 → 重音在最后一个音节
  frase_es: Sí, quiero café.
  traduccion_zh: 是的，我想要咖啡。
  analisis:
  - Sí (有重音) = 是
  - café (有重音) = 咖啡
  tts: zh
  texto_tts_zh: 其他辅音结尾重音在最后一个音节
  texto_tts_es: Sí, quiero café
