- tipo: ejercicio
  titulo_zh: 小练习
  frase_es: ¿Lleva tilde? a) casa b) café c) como
  traduccion_zh: 哪些词有重音？
  analisis:
  - casa = 无重音（以元音结尾）
  - café = 有重音（例外）
  - cómo = 疑问词带重音
  tts: es
  texto_tts_zh: 现在，请做练习。
  texto_tts_es: ¿Lleva tilde? a) casa b) café c) como
- tipo: resumen
  titulo_zh: 总结
  titulo_es: Resumen
  puntos:
  - 以元音结尾重音在倒数第二个音节
  - 其他辅音结尾重音在最后一个音节
  - 疑问词都带重音：
  - 是如果，重音改变意思
  tts: zh
  texto_tts_zh: 以元音结尾重音在倒数第二个音节，其他辅音结尾重音在最后一个音节，疑问词都带重音：，是如果，重音改变意思
