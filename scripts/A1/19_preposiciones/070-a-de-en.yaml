- tipo: explicacion
  titulo_zh: 📖 知识点
  puntos:
  - 'A: dirección, persona, hora'
  - 'De: posesión, origen, materia'
  - 'En: ubicación, medio, idioma, tiempo'
  tts: zh
  texto_tts_zh: ':，:，:'
- tipo: ejemplo
  frase_es: Voy a casa de María a las tres.
  traduccion_zh: 我三点去María家。
  analisis:
  - a = dirección
  - de = posesión (casa de María)
  - a las = hora
  tts: es
  texto_tts_es: Voy a casa de María a las tres
- tipo: ejemplo
  frase_es: Estudio español en la escuela.
  traduccion_zh: 我在学校学习西班牙语。
  analisis:
  - estudio = 学习
  - en la escuela = 在学校
  tts: es
  texto_tts_es: Estudio español en la escuela
- tipo: ejercicio
  titulo_zh: ✏️ 小练习
