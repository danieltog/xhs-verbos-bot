- tipo: explicacion
  titulo_zh: 📖 知识点
  puntos:
  - 'Con: compañía, instrumento'
  - 'Por: causa, medio, frecuencia, precio'
  - 'Para: finalidad, destinatario, dirección'
  - Por la mañana/tarde/noche
  tts: zh
  texto_tts_zh: :，:，:，//
- tipo: ejemplo
  frase_es: Este regalo es para ti.
  traduccion_zh: 这个礼物是给你的。
  analisis:
  - para ti = 给你（destinatario）
  - regalo = 礼物
  tts: es
  texto_tts_es: Este regalo es para ti
- tipo: ejemplo
  frase_es: Gracias por tu ayuda.
  traduccion_zh: 谢谢你的帮助。
  analisis:
  - por = 因为（causa）
  - ayuda = 帮助
  tts: es
  texto_tts_es: Gracias por tu ayuda
- tipo: ejercicio
  titulo_zh: ✏️ 小练习
  frase_es: ¿Por o para? Gracias ____ venir. Esto es ____ ti.
  traduccion_zh: 用por或para填空：谢谢你来。这是给你的。
  analisis:
  - por = 因为（原因）
  - para = 给（目的/接收者）
  tts: es
  texto_tts_es: ¿Por o para? Gracias ____ venir. Esto es ____ ti
