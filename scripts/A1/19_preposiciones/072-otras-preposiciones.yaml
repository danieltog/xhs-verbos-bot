- tipo: explicacion
  titulo_zh: 📖 知识点
  puntos:
  - 'Sobre: encima de / acerca de'
  - 'Entre: entre dos o más'
  - 'Sin: without (sin ti)'
  - 'Hasta: until (hasta luego)'
  - 'Desde: from/since (desde casa)'
  tts: zh
  texto_tts_zh: :/，:，:()，:()，:/()
- tipo: ejemplo
  frase_es: El libro está sobre la mesa.
  traduccion_zh: 书在桌子上。
  analisis:
  - sobre = 在...上面
  - similar a 'encima de'
  tts: es
  texto_tts_es: El libro está sobre la mesa
- tipo: ejemplo
  frase_es: Trabajo de lunes a viernes.
  traduccion_zh: 我从星期一到星期五工作。
  analisis:
  - de...a... = 从...到...
  - sin 'desde' aquí
  tts: es
  texto_tts_es: Trabajo de lunes a viernes
- tipo: ejercicio
  titulo_zh: ✏️ 小练习
  frase_es: 'Completa: Café ____ (sin/con) azúcar. Te espero ____ (hasta/desde) las
    cinco.'
  traduccion_zh: 不加糖的咖啡。我等你到五点。
  analisis:
  - sin = 没有/不加
  - hasta = 直到
  tts: es
  texto_tts_es: 'Completa: Café ____ (sin con) azúcar. Te espero ____ (hasta desde)
    las cinco'
