  - Me gusta = 我喜欢
  - mucho = 很/非常
  tts: es
  texto_tts_es: Me gusta mucho el chocolate
- tipo: ejemplo
  frase_es: A ella le gustan las flores.
  traduccion_zh: 她喜欢花。
  analisis:
  - A ella = 她（强调）
  - gustan + flores (plural)
