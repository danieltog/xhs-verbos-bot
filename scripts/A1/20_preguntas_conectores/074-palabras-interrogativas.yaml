- tipo: explicacion
  titulo_zh: 📖 知识点
  puntos:
  - Qué (什么) / Quién (谁) / Cómo (怎么) / Cuándo (什么时候)
  - Dónde (哪里) / Por qué (为什么) / Cuánto (多少) / Cuál (哪个)
  - Siempre con tilde (acento)
  - ¿Por qué? ≠ Porque (因为)
  tts: zh
  texto_tts_zh: (什么)/(谁)/(怎么)/(什么时候)，(哪里)/(为什么)/(多少)/(哪个)，()，?≠(因为)
- tipo: ejemplo
  frase_es: ¿Por qué estudias español? — Porque me gusta.
  traduccion_zh: 你为什么学西班牙语？因为我喜欢。
  analisis:
  - ¿Por qué? = 为什么？
  - Porque = 因为
  tts: es
  texto_tts_es: ¿Por qué estudias español? — Porque me gusta
- tipo: ejemplo
  frase_es: ¿Cuántos años tienes? ¿Dónde vives?
  traduccion_zh: 你几岁？你住在哪里？
  analisis:
  - Cuántos = 多少（复数）
  - Dónde = 哪里
  tts: es
  texto_tts_es: ¿Cuántos años tienes? ¿Dónde vives?
- tipo: ejercicio
  titulo_zh: ✏️ 小练习
  frase_es: 'Completa: ¿____ es tu nombre? ¿____ años tienes? ¿____ vives?'
  traduccion_zh: 填空：你叫什么？你几岁？你住在哪里？
  analisis:
  - Cuál para nombre
  - Cuántos para edad
  - Dónde para lugar
  tts: es
  texto_tts_es: 'Completa: ¿____ es tu nombre? ¿____ años tienes? ¿____ vives?'
