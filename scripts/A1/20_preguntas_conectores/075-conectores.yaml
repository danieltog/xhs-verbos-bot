- tipo: explicacion
  titulo_zh: 📖 知识点
  puntos:
  - y (和 / 以及)
  - o (或者)
  - pero (但是)
  - porque (因为)
  - también (也) / tampoco (也不)
  - y → e / o → u (antes de misma vocal)
  tts: zh
  texto_tts_zh: (和/以及)，(或者)，(但是)，(因为)，(也)/(也不)，/()
- tipo: ejemplo
  frase_es: Estudio español e inglés.
  traduccion_zh: 我学习西班牙语和英语。
  analisis:
  - e = y (ante i-)
  - inglés = 英语
  tts: es
  texto_tts_es: Estudio español e inglés
- tipo: ejemplo
  frase_es: Quiero ir pero no tengo tiempo.
  traduccion_zh: 我想去但是我没有时间。
  analisis:
  - pero = 但是
  - no tengo tiempo = 没有时间
  tts: es
  texto_tts_es: Quiero ir pero no tengo tiempo
- tipo: ejercicio
  titulo_zh: ✏️ 小练习
  frase_es: 'Completa: Hablo español ____ (y/e) chino. ¿Té ____ (o/u) café?'
  traduccion_zh: 我说西班牙语和中文。茶还是咖啡？
  analisis:
  - y + consonante → y
  - o + consonante → o
  tts: es
  texto_tts_es: 'Completa: Hablo español ____ (y e) chino. ¿Té ____ (o u) café?'
- tipo: resumen
  titulo_zh: 💡 总结
  titulo_es: 💡 Resumen
