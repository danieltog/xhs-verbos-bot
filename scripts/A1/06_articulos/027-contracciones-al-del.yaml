nivel: A1
modulo: 06_articulos
tema: 'Contracciones: al y del'
duracion_segmento: 2.5
slides:
- tipo: portada
  titulo_zh: 'Hola西班牙语 · A1 · Contracciones: al y del'
  titulo_es: 'Hola西班牙语 · A1 · Contracciones: al y del'
  tts: zh
  texto_tts_zh: 今天我们来学习西班牙语。
- tipo: explicacion
  titulo_zh: 🎯 今天的目标
  puntos:
  - Aprender las contracciones obligatorias
  tts: zh
  texto_tts_zh: 学习西班牙语
- tipo: explicacion
  titulo_zh: 📖 知识点
  puntos:
  - a + el = al
  - de + el = del
  - 'Ej: Voy al cine. (不是 a el cine)'
  - 'Ej: La casa del profesor. (不是 de el profesor)'
  - No se contrae con la/los/las
  tts: zh
  texto_tts_zh: +=，+=，:.(不是)，:.(不是)，//
- tipo: ejemplo
  frase_es: Vamos al parque los domingos.
  traduccion_zh: 我们星期天去公园。
  analisis:
  - al = a + el
  - los domingos = 每个星期天
  tts: es
  texto_tts_es: Vamos al parque los domingos
- tipo: ejemplo
  frase_es: El libro del estudiante está aquí.
  traduccion_zh: 学生的书在这里。
  analisis:
  - del = de + el
  - estudiante = 学生
  tts: es
  texto_tts_es: El libro del estudiante está aquí
- tipo: ejercicio
  titulo_zh: ✏️ 小练习
  frase_es: 'Corrige: Voy a el supermercado.'
  traduccion_zh: 改正：Voy a el supermercado.
  analisis:
  - a + el supermercado → al supermercado
  tts: es
  texto_tts_es: 'Corrige: Voy a el supermercado'
- tipo: resumen
  titulo_zh: 💡 总结
  titulo_es: 💡 Resumen
  puntos:
  - :.(不是)
  - :.(不是)
  tts: zh
  texto_tts_zh: :.(不是)，:.(不是)
