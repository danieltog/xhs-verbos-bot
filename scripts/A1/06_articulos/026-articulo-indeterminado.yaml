  puntos:
  - 'un — 一个 (阳性: un perro)'
  - 'una — 一个 (阴性: una casa)'
  - 'unos — 一些 (阳性: unos libros)'
  - 'unas — 一些 (阴性: unas mesas)'
  - Hay + un/una... — 有（一个）...
  tts: zh
  texto_tts_zh: —一个(阳性:)，—一个(阴性:)，—一些(阳性:)，—一些(阴性:)，+/...—有（一个）...
- tipo: ejemplo
  frase_es: Tengo un libro muy interesante.
  traduccion_zh: 我有一本很有趣的书。
  analisis:
  - un libro = 一本书（非特定）
  - muy interesante = 很有趣
  tts: es
  texto_tts_es: Tengo un libro muy interesante
- tipo: ejemplo
  frase_es: En la mesa hay unas manzanas.
  traduccion_zh: 桌子上有一些苹果。
  analisis:
  - Hay = 有
  - unas manzanas = 一些苹果
  tts: es
  texto_tts_es: En la mesa hay unas manzanas
- tipo: ejercicio
  titulo_zh: ✏️ 小练习
  frase_es: 'Completa: Necesito ____ lápiz. (un/una)'
  traduccion_zh: 填空：我需要一支铅笔。
  analisis:
  - lápiz = 阳性 → un
  tts: es
  texto_tts_es: 'Completa: Necesito ____ lápiz. (un una)'
