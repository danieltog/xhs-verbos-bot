- tipo: explicacion
  titulo_zh: 📖 知识点
  puntos:
  - Hoy es [día] de [mes] — 今天是...月...日
  - Primero de [mes] — 每月第一天用 primero
  - ¿Qué fecha es hoy? — 今天几号？
  - ¿Cuándo es...? — ...是什么时候？
  tts: zh
  texto_tts_zh: '[][]—今天是...月...日，[]—每月第一天用，?—今天几号？，...?—...是什么时候？'
- tipo: ejemplo
  frase_es: Hoy es 15 de septiembre.
  traduccion_zh: 今天是9月15日。
  analisis:
  - 15 = quince
  - de = 的（连接日和月）
  tts: es
  texto_tts_es: Hoy es de septiembre
- tipo: ejemplo
  frase_es: — ¿Cuándo es tu cumpleaños? — El 8 de mayo.
  traduccion_zh: 你的生日是什么时候？5月8日。
  analisis:
  - ¿Cuándo? = 什么时候？
  - El + fecha = 在...日
  tts: es
  texto_tts_es: — ¿Cuándo es tu cumpleaños? — El de mayo
- tipo: ejercicio
  titulo_zh: ✏️ 小练习
  frase_es: ¿Cómo se dice "2026年3月5日"?
  traduccion_zh: 用西班牙语说「2026年3月5日」
  analisis:
  - 先日后月再年
  - 5 = cinco (不是quinto)
  tts: es
  texto_tts_es: ¿Cómo se dice ""?
