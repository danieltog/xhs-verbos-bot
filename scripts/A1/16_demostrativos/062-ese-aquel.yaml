  texto_tts_zh: 今天我们来学习西班牙语。
- tipo: explicacion
  titulo_zh: 🎯 今天的目标
  puntos:
  - Diferenciar este, ese y aquel
  tts: zh
  texto_tts_zh: 学习西班牙语
- tipo: explicacion
  titulo_zh: 📖 知识点
  puntos:
  - 'Este: aquí （这里，近）'
  - 'Ese: ahí （那里，中）'
  - 'Aquel: allí （那边，远）'
  - Este libro / Ese libro / Aquel libro
  - Esta casa / Esa casa / Aquella casa
  tts: zh
  texto_tts_zh: :（这里，近），:（那里，中），:（那边，远），//，//
- tipo: ejemplo
  frase_es: Este teléfono es mío. Ese es tuyo. Aquel es de él.
  traduccion_zh: 这个手机是我的。那个是你的。最远处那个是他的。
  analisis:
  - Este (aquí) / Ese (ahí) / Aquel (allí)
  - tres niveles de distancia
  tts: es
  texto_tts_es: Este teléfono es mío. Ese es tuyo. Aquel es de él
- tipo: ejemplo
  frase_es: Aquella montaña es muy alta.
  traduccion_zh: 那座（远处的）山很高。
  analisis:
  - Aquella = 那个（远处）
  - montaña = 山
  tts: es
  texto_tts_es: Aquella montaña es muy alta
- tipo: ejercicio
  titulo_zh: ✏️ 小练习
  frase_es: El libro está lejos → ____ libro.
  traduccion_zh: 那本书在远处 → 用哪个指示词？
  analisis:
  - lejos (远处) → aquel
  tts: es
  texto_tts_es: El libro está lejos → ____ libro
- tipo: resumen
  titulo_zh: 💡 总结
  titulo_es: 💡 Resumen
