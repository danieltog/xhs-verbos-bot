  - Usar HAY para expresar existencia
  tts: zh
  texto_tts_zh: 学习西班牙语
- tipo: explicacion
  titulo_zh: 📖 知识点
  puntos:
  - Hay = 有（存在，不分单复数）
  - Hay un libro. / Hay muchos libros.
  - 'Hay + que + infinitivo: Hay que estudiar.'
  - 'Pasado: Había...'
  tts: zh
  texto_tts_zh: =有（存在，不分单复数），./.，++:.，:...
- tipo: ejemplo
  frase_es: En mi ciudad hay un mercado muy grande.
  traduccion_zh: 我的城市有一个很大的市场。
  analisis:
  - Hay = 有
  - mercado = 市场
  tts: es
  texto_tts_es: En mi ciudad hay un mercado muy grande
- tipo: ejemplo
  frase_es: Hay que hacer la tarea todos los días.
  traduccion_zh: 必须每天做作业。
  analisis:
  - Hay que = 必须（无人称）
  - tarea = 作业
  tts: es
  texto_tts_es: Hay que hacer la tarea todos los días
- tipo: ejercicio
  titulo_zh: ✏️ 小练习
  frase_es: ¿Hay / Está? En la mesa ____ un libro. El libro ____ en la mesa.
  traduccion_zh: 桌子上有一本书。书在桌子上。
  analisis:
  - Hay = existencia (indefinido)
  - Está = ubicación (específico)
  tts: es
  texto_tts_es: ¿Hay Está? En la mesa ____ un libro. El libro ____ en la mesa
- tipo: resumen
  titulo_zh: 💡 总结
  titulo_es: 💡 Resumen
  puntos:
  - =有（存在，不分单复数）
  - ./.
  - ++:.
  - :...
  tts: zh
  texto_tts_zh: =有（存在，不分单复数），./.，++:.，:...
