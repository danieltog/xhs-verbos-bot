- tipo: explicacion
  titulo_zh: 📖 知识点
  puntos:
  - mío/mía/míos/mías — 我的
  - tuyo/tuya/tuyos/tuyas — 你的
  - suyo/suya/suyos/suyas — 他/她/您的/他们的
  - Este libro es mío. / Una amiga mía.
  tts: zh
  texto_tts_zh: ///—我的，///—你的，///—他/她/您的/他们的，./.
- tipo: ejemplo
  frase_es: Este coche es mío. El otro es tuyo.
  traduccion_zh: 这辆车是我的。另一辆是你的。
  analisis:
  - mío = de mí
  - tuyo = de ti
  tts: es
  texto_tts_es: Este coche es mío. El otro es tuyo
- tipo: ejemplo
  frase_es: Es una amiga mía de la universidad.
  traduccion_zh: 她是我大学的一位朋友。
  analisis:
  - amiga mía = 我的朋友（之一）
  - de la universidad = 大学的
  tts: es
  texto_tts_es: Es una amiga mía de la universidad
- tipo: ejercicio
  titulo_zh: ✏️ 小练习
  frase_es: ¿De quién es? La mochila es ____ (mío/mía).
  traduccion_zh: 这是谁的？这个书包是我的。
  analisis:
  - mochila (fem) → mía
  tts: es
  texto_tts_es: ¿De quién es? La mochila es ____ (mío mía)
