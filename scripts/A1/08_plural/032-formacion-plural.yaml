slides:
- tipo: portada
  titulo_zh: Hola西班牙语 · A1 · Formación del plural
  titulo_es: Hola西班牙语 · A1 · Formación del plural
  tts: zh
  texto_tts_zh: 今天我们来学习西班牙语。
- tipo: explicacion
  titulo_zh: 🎯 今天的目标
  puntos:
  - Aprender las reglas para formar el plural
  tts: zh
  texto_tts_zh: 学习西班牙语
- tipo: explicacion
  titulo_zh: 📖 知识点
  puntos:
  - '元音结尾 + s: libro→libros, casa→casas'
  - '辅音结尾 + es: profesor→profesores'
  - '-z → -ces: luz→luces, pez→peces'
  - 'Lunes (不变): el lunes→los lunes'
  tts: zh
  texto_tts_zh: '元音结尾+:，辅音结尾+:，--:，(不变):'
- tipo: ejemplo
  frase_es: Tengo dos libros nuevos.
  traduccion_zh: 我有两本新书。
  analisis:
  - libros = libro + s
  - nuevos = 新的（复数）
  tts: es
  texto_tts_es: Tengo dos libros nuevos
- tipo: ejemplo
  frase_es: Hay muchas ciudades en España.
  traduccion_zh: 西班牙有很多城市。
  analisis:
  - ciudades = ciudad + es
  - -dad → -dades
  tts: es
  texto_tts_es: Hay muchas ciudades en España
- tipo: ejercicio
  titulo_zh: ✏️ 小练习
  frase_es: 'Plural de: profesor, luz, canción, mes'
  traduccion_zh: 写出复数：profesor, luz, canción, mes
  analisis:
  - profesor+es
  - luz→luces (z→c)
  - canción→canciones (tilde消失)
  tts: es
  texto_tts_es: 'Plural de: profesor, luz, canción, mes'
- tipo: resumen
  titulo_zh: 💡 总结
  titulo_es: 💡 Resumen
  puntos:
  - '元音结尾+:'
  - '辅音结尾+:'
  - '--:'
  - '(不变):'
  tts: zh
  texto_tts_zh: '元音结尾+:，辅音结尾+:，--:，(不变):'
