slides:
- tipo: portada
  titulo_zh: 'Hola西班牙语 · A1 · Diferencia: SER vs ESTAR'
  titulo_es: 'Hola西班牙语 · A1 · Diferencia: SER vs ESTAR'
  tts: zh
  texto_tts_zh: 今天我们来学习西班牙语。
- tipo: explicacion
  titulo_zh: 🎯 今天的目标
  puntos:
  - Distinguir cuándo usar SER y cuándo ESTAR
  tts: zh
  texto_tts_zh: 学习西班牙语
- tipo: explicacion
  titulo_zh: 📖 知识点
  puntos:
  - SER = esencia, permanente
  - ESTAR = estado, temporal
  - Es guapo (天生) vs Está guapo (今天)
  - ¿Dónde? → Estar / ¿Qué/Quién? → Ser
  tts: zh
  texto_tts_zh: =，=，(天生)(今天)，?//?
- tipo: ejemplo
  frase_es: María es alta y delgada. Hoy está cansada.
  traduccion_zh: María个子高又瘦。今天她累了。
  analisis:
  - Es alta = 本质特征
  - Está cansada = 临时状态
  tts: es
  texto_tts_es: María es alta y delgada. Hoy está cansada
- tipo: ejemplo
  frase_es: La sopa está fría. — El restaurante es bueno.
  traduccion_zh: 汤凉了。——这家餐厅不错。
  analisis:
  - está fría = 状态（现在）
  - es bueno = 评价（本质）
  tts: es
  texto_tts_es: La sopa está fría. — El restaurante es bueno
- tipo: ejercicio
  titulo_zh: ✏️ 小练习
  frase_es: 'Completa: María ____ (ser/estar) china. Ahora ____ (ser/estar) en México.'
  traduccion_zh: María是中国人。现在她在墨西哥。
  analisis:
  - es china = nacionalidad (ser)
  - está en México = ubicación (estar)
  tts: es
  texto_tts_es: 'Completa: María ____ (ser estar) china. Ahora ____ (ser estar) en
    México'
- tipo: resumen
  titulo_zh: 💡 总结
  titulo_es: 💡 Resumen
  puntos:
  - (天生)(今天)
  - ?//?
  tts: zh
  texto_tts_zh: (天生)(今天)，?//?
