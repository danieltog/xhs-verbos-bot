<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hola西班牙语 · Verbos</title>
<style>
  :root {
    --bg: #0d1b2a; --surface: #132238; --surface2: #1a3350;
    --accent: #ff6b35; --accent2: #004e89; --accent3: #f7c948;
    --text: #eee; --text2: #8899aa; --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Noto Sans SC', 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }

  /* ── Header ── */
  .header {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px; background: var(--surface);
    border-bottom: 2px solid rgba(255,107,53,.15); flex-shrink: 0; z-index: 10;
  }
  .header .logo {
    font-size: 18px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header .badge {
    font-size: 10px; padding: 2px 8px; border-radius: 12px;
    font-weight: 700; background: rgba(255,107,53,.2); color: var(--accent);
    border: 1px solid rgba(255,107,53,.3);
  }
  .header .badge.green { background: rgba(76,175,80,.15); color: #66bb6a; border-color: rgba(76,175,80,.25); }
  .header .spacer { flex: 1; }
  .header .status { font-size: 11px; color: var(--text2); }
  .header button {
    border: none; padding: 6px 16px; border-radius: 8px;
    font-weight: 700; font-size: 12px; cursor: pointer; transition: all .15s;
  }
  .btn-gen { background: linear-gradient(135deg, var(--accent), #e55a2b); color: #fff; }
  .btn-gen:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(255,107,53,.25); }
  .btn-gen:disabled { opacity: .4; cursor: wait; transform: none; }
  .btn-save { background: var(--accent2); color: #fff; }
  .btn-save:hover { filter: brightness(1.3); }

  /* ── Layout ── */
  .main { flex: 1; display: flex; overflow: hidden; }

  /* ── Sidebar (verbo list) ── */
  .sidebar {
    width: 260px; flex-shrink: 0; background: var(--surface);
    border-right: 1px solid rgba(255,255,255,.05);
    display: flex; flex-direction: column;
  }
  .sidebar-header {
    padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,.05);
    display: flex; justify-content: space-between; align-items: center;
  }
  .sidebar-header span { font-size: 11px; color: var(--accent3); text-transform: uppercase; letter-spacing: .5px; font-weight: 700; }
  .sidebar-header .stats { font-size: 10px; color: var(--text2); }
  .verbo-list { flex: 1; overflow-y: auto; padding: 6px; }
  .verbo-list::-webkit-scrollbar { width: 3px; }
  .verbo-list::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

  .verbo-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    margin: 2px 0; border-radius: 6px; cursor: pointer;
    border-left: 3px solid transparent; transition: all .12s;
    font-size: 12px;
  }
  .verbo-item:hover { background: rgba(255,255,255,.04); }
  .verbo-item.active { background: rgba(255,107,53,.1); border-left-color: var(--accent); }
  .verbo-item .freq { font-size: 10px; color: var(--text2); width: 20px; text-align: center; font-weight: 700; }
  .verbo-item .name { flex: 1; font-weight: 600; }
  .verbo-item .name .zh { font-size: 10px; color: var(--text2); display: block; font-weight: 400; }
  .verbo-item .type-badge {
    font-size: 9px; padding: 1px 6px; border-radius: 8px;
    background: rgba(255,255,255,.06); color: var(--text2);
    text-transform: uppercase; letter-spacing: .3px;
  }
  .verbo-item .status-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .verbo-item .status-dot.none { background: #555; }
  .verbo-item .status-dot.script { background: var(--accent3); }
  .verbo-item .status-dot.video { background: #4caf50; }
  .verbo-item .status-dot.active-gen { background: var(--accent); animation: pulse .8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Editor ── */
  .editor { flex: 1; overflow-y: auto; padding: 16px 24px; min-width: 0; }
  .editor::-webkit-scrollbar { width: 4px; }
  .editor::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

  .editor h3 {
    font-size: 20px; margin-bottom: 4px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .editor .meta { font-size: 12px; color: var(--text2); margin-bottom: 16px; }

  .section {
    background: var(--surface); border-radius: var(--radius);
    padding: 14px 18px; margin-bottom: 14px;
    border: 1px solid rgba(255,255,255,.04);
  }
  .section h4 {
    font-size: 12px; color: var(--accent3); text-transform: uppercase;
    letter-spacing: .5px; margin-bottom: 10px; font-weight: 700;
  }

  .form-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .form-row label { font-size: 10px; color: var(--text2); width: 80px; flex-shrink: 0; text-transform: uppercase; letter-spacing: .3px; }
  .form-row input {
    flex: 1; background: var(--surface2); border: 1px solid rgba(255,255,255,.08);
    color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 13px;
    font-family: inherit; min-width: 0;
  }
  .form-row input:focus { outline: none; border-color: var(--accent); }

  /* ── Conjugation table ── */
  .conj-table { width: 100%; border-collapse: collapse; margin-top: 6px; }
  .conj-table th {
    font-size: 10px; color: var(--text2); text-transform: uppercase;
    padding: 6px 10px; text-align: left; font-weight: 600;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .conj-table td { padding: 4px 6px; }
  .conj-table input {
    width: 100%; background: var(--surface2); border: 1px solid rgba(255,255,255,.06);
    color: var(--text); padding: 5px 8px; border-radius: 4px; font-size: 13px;
    font-family: inherit;
  }
  .conj-table input:focus { outline: none; border-color: var(--accent); }
  .conj-table input.forma { color: var(--accent3); font-weight: 700; font-size: 14px; }
  .conj-table tr:hover td { background: rgba(255,255,255,.02); }

  /* ── Examples ── */
  .example-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
  .example-row .num { width: 24px; font-size: 10px; color: var(--text2); text-align: center; }
  .example-row input { flex: 1; }
  .example-row input.es { color: var(--text); }
  .example-row input.zh { color: var(--accent2); }
  .example-row .del-ej {
    width: 26px; height: 26px; background: rgba(255,100,100,.15); color: #ff6b6b;
    border: none; border-radius: 5px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: all .15s;
  }
  .example-row .del-ej:hover { background: rgba(255,100,100,.3); }
  .btn-add {
    background: var(--surface2); color: var(--accent2); border: 1px dashed rgba(255,255,255,.12);
    padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 11px; margin-top: 4px;
    font-weight: 600;
  }
  .btn-add:hover { border-color: var(--accent2); }
  .form-row input.tts-field { background: rgba(247,201,72,.06); border-color: rgba(247,201,72,.12); font-size: 12px; }
  .form-row input.tts-field:focus { border-color: var(--accent3); }
  .tts-label { font-size: 9px; color: var(--accent3); margin-left: 4px; }

  /* ── Slide tabs ── */
  .slide-tabs {
    display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px;
  }
  .slide-tab {
    padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,.08);
    background: var(--surface2); color: var(--text2); font-size: 10px;
    cursor: pointer; transition: all .12s;
  }
  .slide-tab:hover { border-color: rgba(255,255,255,.2); }
  .slide-tab.active { background: rgba(255,107,53,.15); border-color: var(--accent); color: var(--text); }

  /* ── Preview ── */
  .preview-pane {
    width: 360px; flex-shrink: 0; background: #080f18;
    border-left: 1px solid rgba(255,255,255,.05);
    display: flex; flex-direction: column; align-items: center; padding: 12px;
    overflow-y: auto;
  }
  .preview-label {
    font-size: 10px; color: var(--text2); margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .phone-frame {
    width: 312px; height: 555px; border-radius: 20px;
    border: 3px solid var(--surface2); overflow: hidden;
    background: #111; display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow);
  }
  .phone-frame img { width: 100%; height: 100%; object-fit: cover; }
  .phone-frame video { width: 100%; height: 100%; object-fit: cover; }
  .phone-frame .placeholder { color: var(--text2); font-size: 13px; text-align: center; padding: 20px; }
  .preview-meta { margin-top: 8px; display: flex; gap: 16px; }
  .preview-meta .stat { text-align: center; }
  .preview-meta .stat .val { font-size: 13px; font-weight: 700; color: var(--accent); }
  .preview-meta .stat .lbl { font-size: 9px; color: var(--text2); text-transform: uppercase; }

  /* ── View toggle ── */
  .view-toggle {
    display: flex; gap: 4px; margin-bottom: 8px;
    background: var(--surface2); border-radius: 8px; padding: 3px;
  }
  .view-toggle button {
    padding: 4px 14px; border: none; border-radius: 6px;
    background: transparent; color: var(--text2); font-size: 11px;
    cursor: pointer; font-weight: 600; transition: all .15s;
  }
  .view-toggle button.active { background: var(--accent); color: #111; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.75);
    display: none; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border-radius: 14px; padding: 20px;
    max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
  }
  .modal h2 { margin-bottom: 10px; font-size: 15px; }
  .modal .log { background: #050a14; border-radius: 8px; padding: 10px; font-size: 11px;
    font-family: 'SF Mono', monospace; max-height: 200px; overflow-y: auto; line-height: 1.6; }
  .modal .log .ok { color: #4caf50; }
  .modal .log .err { color: #ff6464; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 20px; right: 20px; z-index: 200;
    background: var(--surface); border: 1px solid rgba(255,255,255,.1);
    padding: 10px 20px; border-radius: 8px; font-size: 12px;
    box-shadow: var(--shadow); display: none; animation: slideUp .3s;
  }
  .toast.show { display: block; }
  @keyframes slideUp { from {opacity:0;transform:translateY(20px)} to {opacity:1;transform:translateY(0)} }

  @media (max-width: 1100px) { .preview-pane { display: none; } .sidebar { width: 200px; } }
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <span class="logo">Hola西班牙语</span>
  <span class="badge">Verbos</span>
  <span class="badge green" id="videoBadge" style="display:none">Video ✓</span>
  <div class="spacer"></div>
  <span class="status" id="statusText">Selecciona un verbo</span>
  <button class="btn-save" onclick="saveVerbo()">💾 Guardar</button>
  <button class="btn-gen" onclick="generateVideo()">🎬 Generar Video</button>
</div>

<!-- ── Main layout ── -->
<div class="main">
  <!-- Sidebar: verbo list -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span>📖 Verbos</span>
      <span class="stats" id="sidebarStats">0/0</span>
    </div>
    <div class="verbo-list" id="verboList"></div>
  </div>

  <!-- Editor -->
  <div class="editor" id="editor">
    <div style="color:var(--text2);padding:80px 40px;text-align:center">
      <div style="font-size:48px;margin-bottom:12px">🔤</div>
      <div style="font-size:16px;margin-bottom:4px">Hola西班牙语</div>
      <div style="font-size:13px">Selecciona un verbo de la lista<br>para editar su contenido y generar el video</div>
    </div>
  </div>

  <!-- Preview -->
  <div class="preview-pane">
    <div class="view-toggle">
      <button id="viewSlideBtn" class="active" onclick="setView('slide')">📸 Slides</button>
      <button id="viewVideoBtn" onclick="setView('video')">🎬 Video</button>
    </div>
    <div class="phone-frame" id="phoneFrame">
      <div class="placeholder">Selecciona un slide<br>para previsualizar</div>
    </div>
    <div class="preview-meta" id="previewMeta">
      <div class="stat"><div class="val" id="slideNum">-</div><div class="lbl">Slide</div></div>
      <div class="stat"><div class="val" id="slideType">-</div><div class="lbl">Tipo</div></div>
    </div>
    <div class="preview-meta" id="videoMeta" style="display:none">
      <div class="stat"><div class="val" id="videoSize">-</div><div class="lbl">Peso</div></div>
      <div class="stat"><div class="val" id="videoDur">-</div><div class="lbl">Duración</div></div>
      <a id="videoDownload" href="#" style="font-size:11px;color:var(--accent2);text-decoration:none;font-weight:600">⬇ Descargar</a>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">Generando video...</h2>
    <div class="log" id="logArea"></div>
    <div style="margin-top:10px;text-align:right">
      <a id="downloadBtn" style="display:none;background:var(--accent);color:#fff;padding:6px 16px;border-radius:6px;text-decoration:none;font-weight:700;font-size:12px" href="#">⬇ Descargar</a>
      <button onclick="closeModal()" style="margin-left:6px;background:var(--surface2);color:var(--text);border:none;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:12px">Cerrar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/static/app.js"></script>
</body>
</html>
